services:
  - type: web
    name: securelend-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ML_SERVICE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: BLOCKCHAIN_RPC_URL
        sync: false
      - key: BLOCKCHAIN_CONTRACT_ADDRESS
        sync: false
      - key: BLOCKCHAIN_PRIVATE_KEY
        sync: false
      - key: ADMIN_NAME
        value: SecureLend Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PHONE
        value: +10000000000

  - type: web
    name: securelend-ml-api
    env: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt && python training/train_model.py
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        sync: false
